<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="../fontawesome-free-7.2.0-web/css/all.min.css"
    />

    <!-- Main CSS -->
    <link rel="stylesheet" href="/css/styles.css" />

    <title>Coffeea</title>
  </head>

  <body>
    <!-- ================= Header ================= -->

    <header class="header">
      <!-- Logo -->

      <div class="logo">
        <i id="logo-id-icon" class="fas fa-coffee logo-icon"></i>

        <h2 class="logo-text">Coffeea</h2>
      </div>

      <!-- Navigation -->

      <nav class="navbar">
        <ul class="nav-list">
          <li class="nav-item">
            <a href="#" class="nav-link">Home</a>
          </li>

          <li class="nav-item">
            <a href="#" class="nav-link">Menu</a>
          </li>

          <li class="nav-item">
            <a href="#" class="nav-link">About Us</a>
          </li>

          <li class="nav-item">
            <a href="#" class="nav-link">Contact</a>
          </li>
        </ul>
      </nav>

      <!-- Button -->

      <button class="signup-btn">Sign Up</button>
    </header>

    <!-- ================= Hero ================= -->

    <main>
      <section class="hero">
        <div class="hero-image">
          <img
            src="../Images/1782933093661.png"
            alt="Coffee Cup"
            class="hero-img"
          />
        </div>
      </section>
      <div class="box-shadow-left">
        <div class="text-main">
          <h2 class="h2-main-1-2">Brewed with Love.</h2>
          <h2 class="text-main-1-2">Served with Warmth.</h2>
        </div>
        <div class="text-2-main">
          <h2 id="h2-3-text-main">
            Diccover hand-crafted coffee, made with locally
          </h2>
          <h2 id="h2-4-text-main">sourced beans and hearts.</h2>
        </div>
        <h3 class="h3-main-1">4.9 stars from 500+reviews</h3>
        <hr />
        <div class="folow-us-main">
          <h3>Follow us on</h3>
          <div class="icons-follow-us-main">
            <a href="" class="fab fa-instagram"></a>
            <a href="" class="fab fa-twitter-square"></a>
            <a href="" class="fab fa-facebook"></a>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
